name: SCANOSS

on:
  pull_request:
  push:
    branches:
      - "*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-code-scan:
    name: SCANOSS Code Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run SCANOSS Code Scan
        id: scanoss-code-scan-step
        uses: scanoss/gha-code-scan@v1
        with:
          policies: undeclared
          policies.halt_on_failure: 'false'
          api.url: https://api.scanoss.com/scan/direct
          api.key: ${{ secrets.SC_API_KEY }}
